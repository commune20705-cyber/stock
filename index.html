<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>うちのストック</title>
<style>
  :root{
    --bg: #FAF6F1;
    --card: #FFFFFF;
    --card-soft: #F3ECE2;
    --ink: #3A3530;
    --ink-soft: #8A8175;
    --line: #E6DCCB;
    --accent: #2E3338;
    --blue: #7B9E89;
    --blue-deep: #4F7763;
    --blue-bg: #E7EFE9;
    --blue-text: #3F5C4C;
    --yellow: #D9A857;
    --yellow-deep: #AF7C26;
    --yellow-bg: #FBF1E0;
    --yellow-text: #8A6322;
    --red: #C4665A;
    --red-deep: #993E33;
    --red-bg: #FBEAE7;
    --red-text: #8A3C32;
  }
  *{ box-sizing: border-box; }
  body{
    margin:0;
    font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Noto Sans JP", sans-serif;
    background: var(--bg);
    color: var(--ink);
    -webkit-font-smoothing: antialiased;
  }
  #app{
    max-width: 480px;
    margin: 0 auto;
    min-height: 100vh;
    padding-bottom: 90px;
  }
  header{
    padding: 28px 20px 16px;
  }
  header h1{
    font-size: 21px;
    font-weight: 600;
    margin: 0 0 2px;
    letter-spacing: 0.02em;
  }
  header p{
    font-size: 13px;
    color: var(--ink-soft);
    margin: 0;
  }
  .tabs{
    display: flex;
    gap: 6px;
    padding: 0 20px;
    margin-bottom: 18px;
  }
  .tab{
    flex: 1;
    text-align: center;
    padding: 10px 0;
    border-radius: 999px;
    font-size: 14px;
    font-weight: 600;
    background: var(--card-soft);
    color: var(--ink-soft);
    border: none;
    cursor: pointer;
    position: relative;
    transition: background 0.15s, color 0.15s;
  }
  .tab.active{
    background: var(--accent);
    color: #fff;
  }
  .tab .badge{
    position: absolute;
    top: -6px;
    right: 10px;
    background: var(--red);
    color: #fff;
    font-size: 10px;
    font-weight: 700;
    border-radius: 999px;
    min-width: 16px;
    height: 16px;
    line-height: 16px;
    padding: 0 4px;
  }
  main{ padding: 0 20px; }
  .section-label{
    font-size: 12px;
    font-weight: 600;
    color: var(--ink-soft);
    letter-spacing: 0.06em;
    margin: 22px 0 10px;
    padding-left: 2px;
  }
  .section-label:first-child{ margin-top: 4px; }
  .cat-filter-row{
    display: flex;
    gap: 6px;
    overflow-x: auto;
    padding: 2px 2px 14px;
    margin: 0 -2px;
  }
  .cat-filter-chip{
    flex-shrink: 0;
    padding: 7px 14px;
    border-radius: 999px;
    background: var(--card-soft);
    border: 1px solid var(--line);
    font-size: 13px;
    font-weight: 600;
    color: var(--ink-soft);
    cursor: pointer;
  }
  .cat-filter-chip.active{
    background: var(--accent);
    border-color: var(--accent);
    color: #fff;
  }
  .cat-group{ margin-bottom: 4px; }
  .item-card{
    background: var(--card);
    border: 1px solid var(--line);
    border-radius: 16px;
    padding: 12px 14px;
    margin-bottom: 8px;
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .item-main{ flex: 1; min-width: 0; }
  .item-name{
    font-size: 15px;
    font-weight: 600;
    margin: 0 0 2px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .item-meta{
    font-size: 11.5px;
    color: var(--ink-soft);
    display: flex;
    gap: 8px;
    align-items: center;
  }
  .status-dots{
    display: flex;
    gap: 5px;
    flex-shrink: 0;
  }
  .dot-btn{
    width: 30px;
    height: 30px;
    border-radius: 50%;
    border: 2px solid transparent;
    cursor: pointer;
    padding: 0;
    position: relative;
    opacity: 0.25;
    transform: scale(0.82);
    transition: opacity 0.15s, transform 0.15s;
  }
  .dot-btn.blue{ background: var(--blue); }
  .dot-btn.yellow{ background: var(--yellow); }
  .dot-btn.red{ background: var(--red); }
  .dot-btn.selected{
    opacity: 1;
    transform: scale(1);
    box-shadow: 0 2px 7px rgba(0,0,0,0.18);
  }
  .dot-btn.blue.selected{ border-color: var(--blue-deep); }
  .dot-btn.yellow.selected{ border-color: var(--yellow-deep); }
  .dot-btn.red.selected{ border-color: var(--red-deep); }
  .dot-btn.selected::after{
    content: "";
    position: absolute;
    inset: -5px;
    border: 1.5px solid;
    border-radius: 50%;
  }
  .dot-btn.blue.selected::after{ border-color: var(--blue-deep); }
  .dot-btn.yellow.selected::after{ border-color: var(--yellow-deep); }
  .dot-btn.red.selected::after{ border-color: var(--red-deep); }
  .del-btn{
    width: 30px;
    height: 30px;
    border-radius: 50%;
    border: none;
    background: transparent;
    color: var(--ink-soft);
    font-size: 16px;
    cursor: pointer;
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .del-btn:active{ background: var(--card-soft); }
  .icon-btn{
    width: 30px;
    height: 30px;
    border-radius: 50%;
    border: none;
    background: var(--card-soft);
    color: var(--ink);
    cursor: pointer;
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .icon-btn:active{ background: var(--line); }
  .icon-btn:disabled{ opacity: 0.3; cursor: default; }
  .reorder-group{ display: flex; gap: 5px; flex-shrink: 0; }
  .edit-bar{
    display: flex;
    justify-content: flex-end;
    align-items: center;
    margin-bottom: 8px;
  }
  .edit-toggle{
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 7px 14px;
    border-radius: 999px;
    background: var(--card-soft);
    border: 1px solid var(--line);
    font-size: 13px;
    font-weight: 600;
    color: var(--ink-soft);
    cursor: pointer;
  }
  .edit-toggle.active{ background: var(--accent); border-color: var(--accent); color: #fff; }
  .drag-handle{
    width: 34px;
    height: 34px;
    border: none;
    background: transparent;
    color: var(--ink-soft);
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    cursor: grab;
    touch-action: none;
  }
  .item-card.dragging{
    opacity: 0.9;
    box-shadow: 0 8px 20px rgba(0,0,0,0.18);
    background: var(--card-soft);
  }
  .item-main.editable{ cursor: pointer; }
  .memo-card{
    background: var(--card);
    border: 1px solid var(--line);
    border-radius: 16px;
    padding: 12px 14px;
    margin-top: 18px;
  }
  .memo-label{
    font-size: 12px;
    font-weight: 600;
    color: var(--ink-soft);
    letter-spacing: 0.06em;
    margin-bottom: 6px;
  }
  .memo-input{
    width: 100%;
    border: none;
    background: transparent;
    resize: vertical;
    min-height: 72px;
    font-size: 16px;
    color: var(--ink);
    font-family: inherit;
    line-height: 1.6;
    outline: none;
    padding: 0;
  }
  .add-form{
    background: var(--card);
    border: 1px solid var(--line);
    border-radius: 16px;
    padding: 14px;
    margin-bottom: 18px;
  }
  .add-form input, .add-form select{
    width: 100%;
    padding: 10px 12px;
    border-radius: 10px;
    border: 1px solid var(--line);
    background: var(--bg);
    font-size: 16px;
    color: var(--ink);
    margin-bottom: 8px;
  }
  .add-form .row{ display:flex; gap: 8px; }
  .add-form .row > *{ flex:1; }
  .add-btn{
    width: 100%;
    padding: 11px 0;
    border-radius: 10px;
    border: none;
    background: var(--accent);
    color: #fff;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
  }
  .template-row{
    display: flex;
    gap: 8px;
    overflow-x: auto;
    padding: 2px 2px 14px;
    margin: 0 -2px;
  }
  .template-chip{
    flex-shrink: 0;
    padding: 8px 14px;
    border-radius: 999px;
    background: var(--card-soft);
    border: 1px solid var(--line);
    font-size: 13px;
    color: var(--ink);
    cursor: pointer;
    white-space: nowrap;
  }
  .empty{
    text-align: center;
    padding: 50px 20px;
    color: var(--ink-soft);
    font-size: 13.5px;
    line-height: 1.7;
  }
  .fab{
    position: fixed;
    bottom: 24px;
    right: 50%;
    transform: translateX(170px);
    width: 52px;
    height: 52px;
    border-radius: 50%;
    background: var(--accent);
    color: #fff;
    font-size: 26px;
    border: none;
    box-shadow: 0 4px 14px rgba(0,0,0,0.18);
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  @media (max-width: 480px){
    .fab{ right: 24px; transform: none; }
  }
  .shop-item{
    background: var(--card);
    border: 1px solid var(--line);
    border-radius: 16px;
    padding: 13px 14px;
    margin-bottom: 8px;
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .shop-check{
    width: 26px;
    height: 26px;
    border-radius: 50%;
    border: 2px solid var(--line);
    flex-shrink: 0;
    cursor: pointer;
    background: transparent;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 14px;
  }
  .shop-main{ flex: 1; }
  .shop-name{ font-size: 15px; font-weight: 600; margin: 0 0 2px; }
  .shop-tag{
    display: inline-block;
    font-size: 11px;
    font-weight: 700;
    padding: 2px 8px;
    border-radius: 999px;
  }
  .shop-tag.red{ background: var(--red-bg); color: var(--red-text); }
  .shop-tag.yellow{ background: var(--yellow-bg); color: var(--yellow-text); }
  .modal-overlay{
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.4);
    display: flex; align-items: flex-end; justify-content: center;
    z-index: 50;
  }
  .modal-sheet{
    background: var(--bg);
    width: 100%;
    max-width: 480px;
    border-radius: 20px 20px 0 0;
    padding: 20px 20px 28px;
  }
  .modal-sheet h3{ margin: 0 0 14px; font-size: 17px; font-weight: 600; }
  .close-row{ text-align: right; margin-bottom: 4px; }
  .close-row button{
    border:none; background:none; color: var(--ink-soft); font-size: 13px; cursor:pointer;
  }
  .legend{
    display: flex;
    gap: 14px;
    font-size: 11.5px;
    color: var(--ink-soft);
    padding: 0 22px 6px;
  }
  .legend span{ display:flex; align-items:center; gap:4px; }
  .legend i{ width:8px; height:8px; border-radius:50%; display:inline-block; }
  .loading{ text-align:center; padding: 60px 0; color: var(--ink-soft); font-size: 13px; }
</style>
</head>
<body>
<div id="app"><div class="loading">読み込み中…</div></div>

<script>
const CATEGORIES_FOOD = ["冷蔵庫","野菜室","冷凍庫","乾物","調味料"];
const CATEGORY_DAILY = "日用品";
const DEFAULT_TEMPLATES = [
  {name:"卵", category:"冷蔵庫"},
  {name:"牛乳", category:"冷蔵庫"},
  {name:"納豆", category:"冷蔵庫"},
  {name:"鶏むね肉", category:"冷凍庫"},
  {name:"米", category:"乾物"},
  {name:"パスタ", category:"乾物"},
  {name:"醤油", category:"調味料"},
  {name:"味噌", category:"調味料"},
  {name:"トイレットペーパー", category:"日用品"},
  {name:"洗濯洗剤", category:"日用品"},
  {name:"歯磨き粉", category:"日用品"},
];

let state = {
  items: [],
  templates: DEFAULT_TEMPLATES,
  tab: "inventory",
  showAdd: false,
  categoryFilter: "all",
  editMode: false,
  editingItemId: null,
  memo: "",
};

const STORAGE_KEY = "stock-items-v1";

function uid(){ return Date.now().toString(36) + Math.random().toString(36).slice(2,7); }

function daysBetween(a,b){
  return Math.round((b-a)/(1000*60*60*24));
}

async function loadState(){
  try{
    const raw = localStorage.getItem(STORAGE_KEY);
    if(raw){
      const parsed = JSON.parse(raw);
      state.items = parsed.items || [];
      state.memo = parsed.memo || "";
    }
  }catch(e){
    state.items = [];
  }
  // ブラウザにデータを長期保存（消えにくく）するようリクエスト
  try{
    if(navigator.storage && navigator.storage.persist){
      await navigator.storage.persist();
    }
  }catch(e){ /* 未対応ブラウザは無視 */ }
  render();
}

function saveState(){
  try{
    localStorage.setItem(STORAGE_KEY, JSON.stringify({items: state.items, memo: state.memo}));
  }catch(e){
    console.error("保存に失敗しました", e);
  }
}

function addItem(name, category){
  if(!name || !name.trim()) return;
  const exists = state.items.find(i => i.name === name.trim() && i.category === category);
  if(exists){
    exists.status = "blue";
    exists.lastBought = Date.now();
    exists.history.push(Date.now());
  } else {
    state.items.push({
      id: uid(),
      name: name.trim(),
      category: category,
      status: "blue",
      lastBought: Date.now(),
      history: [Date.now()],
    });
  }
  saveState();
  render();
}

function setStatus(id, status){
  const item = state.items.find(i => i.id === id);
  if(!item) return;
  item.status = status;
  if(status === "blue"){
    item.lastBought = Date.now();
    item.history.push(Date.now());
    if(item.history.length > 10) item.history.shift();
  }
  saveState();
  render();
}

function deleteItem(id){
  state.items = state.items.filter(i => i.id !== id);
  saveState();
  render();
}

function getCycleText(item){
  if(item.history.length < 2) return null;
  const intervals = [];
  for(let i=1;i<item.history.length;i++){
    intervals.push(daysBetween(item.history[i-1], item.history[i]));
  }
  const avg = Math.round(intervals.reduce((a,b)=>a+b,0)/intervals.length);
  return avg;
}

function freqScore(item){
  // 平均購入サイクル（日数）。短いほど頻繁になくなる＝上位。記録不足は下に。
  const cycle = getCycleText(item);
  if(cycle === null) return Infinity;
  return cycle;
}

function sortItemsInCategory(items){
  return items.slice().sort((a,b) => {
    const aHas = typeof a.order === "number";
    const bHas = typeof b.order === "number";
    // 手動で並べ替えた品目を優先（order順）
    if(aHas && bHas) return a.order - b.order;
    if(aHas) return -1;
    if(bHas) return 1;
    // それ以外は「頻繁になくなる順」で自動表示
    return freqScore(a) - freqScore(b);
  });
}

function toggleEdit(){
  state.editMode = !state.editMode;
  render();
}

/* ===== 長押しで編集モードに入る（在庫タブ・通常表示時） ===== */
let longPressTimer = null;
function setupLongPress(){
  document.querySelectorAll(".item-card").forEach(card => {
    card.addEventListener("pointerdown", onLongPressStart);
  });
}
function onLongPressStart(e){
  if(e.target.closest("button")) return; // ステータス等のボタン操作は除外
  const sx = e.clientX, sy = e.clientY;
  longPressTimer = setTimeout(() => {
    cleanup();
    state.editMode = true;
    render();
  }, 450);
  function cancel(ev){
    if(ev.type === "pointermove" && Math.abs(ev.clientX - sx) < 10 && Math.abs(ev.clientY - sy) < 10) return;
    cleanup();
  }
  function cleanup(){
    clearTimeout(longPressTimer);
    document.removeEventListener("pointermove", cancel);
    document.removeEventListener("pointerup", cancel);
    document.removeEventListener("pointercancel", cancel);
  }
  document.addEventListener("pointermove", cancel);
  document.addEventListener("pointerup", cancel);
  document.addEventListener("pointercancel", cancel);
}

/* ===== ハンドルをドラッグして並べ替え（編集モード時） ===== */
let dragCtx = null;
function setupDrag(){
  document.querySelectorAll(".drag-handle").forEach(h => {
    h.addEventListener("pointerdown", onDragStart);
  });
}
function onDragStart(e){
  e.preventDefault();
  const row = e.target.closest(".item-card");
  const group = row && row.closest(".cat-group");
  if(!row || !group) return;
  dragCtx = { row, group };
  row.classList.add("dragging");
  row.style.pointerEvents = "none";
  document.addEventListener("pointermove", onDragMove, { passive: false });
  document.addEventListener("pointerup", onDragEnd);
  document.addEventListener("pointercancel", onDragEnd);
}
function onDragMove(e){
  if(!dragCtx) return;
  e.preventDefault();
  const el = document.elementFromPoint(e.clientX, e.clientY);
  const overRow = el && el.closest(".item-card");
  if(!overRow || overRow === dragCtx.row) return;
  if(overRow.closest(".cat-group") !== dragCtx.group) return; // 同じカテゴリ内のみ
  const rect = overRow.getBoundingClientRect();
  const before = e.clientY < rect.top + rect.height / 2;
  dragCtx.group.insertBefore(dragCtx.row, before ? overRow : overRow.nextSibling);
}
function onDragEnd(){
  if(!dragCtx) return;
  const group = dragCtx.group;
  dragCtx.row.classList.remove("dragging");
  dragCtx.row.style.pointerEvents = "";
  document.removeEventListener("pointermove", onDragMove);
  document.removeEventListener("pointerup", onDragEnd);
  document.removeEventListener("pointercancel", onDragEnd);
  dragCtx = null;
  // 並び順を確定
  group.querySelectorAll(".item-card").forEach((r, n) => {
    const item = state.items.find(i => i.id === r.getAttribute("data-id"));
    if(item) item.order = n;
  });
  saveState();
  render();
}

/* ===== 項目をタップして 名前変更/カテゴリ再選択 ===== */
function openEditItem(id){
  state.editingItemId = id;
  render();
  setTimeout(() => {
    const el = document.getElementById("edit-item-name");
    if(el) el.focus();
  }, 50);
}
function closeEditItem(){
  state.editingItemId = null;
  render();
}
function saveEditItem(){
  const item = state.items.find(i => i.id === state.editingItemId);
  if(!item){ closeEditItem(); return; }
  const name = document.getElementById("edit-item-name").value.trim();
  const cat = document.getElementById("edit-item-category").value;
  if(name) item.name = name;
  if(cat && cat !== item.category){
    item.category = cat;
    delete item.order; // カテゴリ移動時は並び順をリセット（移動先で自動表示）
  }
  saveState();
  closeEditItem();
}

/* ===== 買い物リストのメモ（再描画せず保存してフォーカス維持） ===== */
function onMemoInput(v){
  state.memo = v;
  saveState();
}

function escapeHtml(s){
  return s.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");
}

function renderDots(item){
  const colors = ["blue","yellow","red"];
  return `<div class="status-dots">
    ${colors.map(c => `<button class="dot-btn ${c} ${item.status===c?'selected':''}" aria-label="${c}" onclick="setStatus('${item.id}','${c}')"></button>`).join("")}
  </div>`;
}

function renderInventoryTab(){
  const allCats = [...CATEGORIES_FOOD, CATEGORY_DAILY];
  let html = "";

  const filterChips = ["all", ...allCats];
  html += `
    <div class="cat-filter-row">
      ${filterChips.map(c => `<button class="cat-filter-chip ${state.categoryFilter===c?'active':''}" onclick="setCategoryFilter('${escapeHtml(c)}')">${c === 'all' ? '一覧表示' : escapeHtml(c)}</button>`).join("")}
    </div>
  `;

  html += `
    <div class="edit-bar">
      <button class="edit-toggle ${state.editMode?'active':''}" onclick="toggleEdit()">
        ${state.editMode ? '完了' : `<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>並べ替え・削除`}
      </button>
    </div>
  `;

  const catsToShow = state.categoryFilter === "all" ? allCats : [state.categoryFilter];

  if(state.editMode){
    html += `<div class="empty" style="padding:8px 20px 14px;">三本線（≡）をドラッグで並べ替え／項目をタップで名前・カテゴリ変更</div>`;
  }

  if(state.items.length === 0){
    html += `<div class="empty">在庫がまだありません。<br>右下の + ボタンから追加してください。</div>`;
  } else {
    let anyShown = false;
    catsToShow.forEach(cat => {
      const itemsInCat = sortItemsInCategory(state.items.filter(i => i.category === cat));
      if(itemsInCat.length === 0) return;
      anyShown = true;
      html += `<div class="section-label">${escapeHtml(cat)}</div>`;
      html += `<div class="cat-group" data-cat="${escapeHtml(cat)}">`;
      itemsInCat.forEach((item) => {
        const cycle = getCycleText(item);
        let lead = "";
        let trail;
        if(state.editMode){
          lead = `<button class="drag-handle" aria-label="ドラッグで並べ替え"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M4 7h16"/><path d="M4 12h16"/><path d="M4 17h16"/></svg></button>`;
          trail = `<button class="del-btn" aria-label="削除" onclick="deleteItem('${item.id}')">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 6h18"/><path d="M8 6V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/><path d="M10 11v6"/><path d="M14 11v6"/></svg>
            </button>`;
        } else {
          trail = renderDots(item);
        }
        const mainAttr = state.editMode ? ` class="item-main editable" onclick="openEditItem('${item.id}')"` : ` class="item-main"`;
        html += `
          <div class="item-card" data-id="${item.id}" data-cat="${escapeHtml(cat)}">
            ${lead}
            <div${mainAttr}>
              <p class="item-name">${escapeHtml(item.name)}</p>
              <div class="item-meta">
                <span>${cycle ? `平均${cycle}日サイクル` : "購入記録なし"}</span>
              </div>
            </div>
            ${trail}
          </div>
        `;
      });
      html += `</div>`;
    });
    if(!anyShown){
      html += `<div class="empty">このカテゴリにはまだ在庫がありません。</div>`;
    }
  }
  return html;
}

function renderShoppingTab(){
  const needed = state.items.filter(i => i.status === "yellow" || i.status === "red");

  let html = "";

  if(needed.length === 0){
    html += `<div class="empty">買い物リストは空です。<br>在庫が黄色・赤になると自動でここに表示されます。</div>`;
  } else {
    // 食材（冷蔵庫・野菜室・冷凍庫・乾物・調味料）／日用品 でグループ化
    const groups = [
      { label: "食材", cats: CATEGORIES_FOOD },
      { label: "日用品", cats: [CATEGORY_DAILY] },
    ];
    groups.forEach(g => {
      const list = needed.filter(i => g.cats.includes(i.category));
      list.sort((a,b) => (a.status === b.status) ? 0 : (a.status === "red" ? -1 : 1));
      if(list.length === 0) return;
      html += `<div class="section-label">${g.label}（${list.length}）</div>`;
      list.forEach(item => {
        html += `
          <div class="shop-item">
            <button class="shop-check" aria-label="買った" onclick="setStatus('${item.id}','blue')"></button>
            <div class="shop-main">
              <p class="shop-name">${escapeHtml(item.name)}</p>
              <span class="shop-tag ${item.status}">${item.status === 'red' ? '必須' : '検討'}</span>
            </div>
          </div>
        `;
      });
    });
  }

  // 下部に固定のメモ欄（自動保存）
  html += `
    <div class="memo-card">
      <div class="memo-label">メモ</div>
      <textarea class="memo-input" placeholder="買い忘れ防止メモ（自動保存されます）" oninput="onMemoInput(this.value)">${escapeHtml(state.memo || "")}</textarea>
    </div>
  `;
  return html;
}

function renderAddModal(){
  if(!state.showAdd) return "";
  // 選択中のカテゴリーがあれば、それを初期値にする
  const defaultCat = (state.categoryFilter && state.categoryFilter !== "all") ? state.categoryFilter : CATEGORIES_FOOD[0];
  return `
    <div class="modal-overlay" onclick="if(event.target===this) closeAdd()">
      <div class="modal-sheet">
        <div class="close-row"><button onclick="closeAdd()">閉じる</button></div>
        <h3>新しい品目を追加</h3>
        <div class="add-form">
          <input type="text" id="new-item-name" placeholder="品名（例：ヨーグルト）" />
          <select id="new-item-category">
            ${[...CATEGORIES_FOOD, CATEGORY_DAILY].map(c => `<option value="${escapeHtml(c)}" ${c === defaultCat ? "selected" : ""}>${escapeHtml(c)}</option>`).join("")}
          </select>
          <button class="add-btn" onclick="submitAdd()">追加する</button>
        </div>
      </div>
    </div>
  `;
}

function submitAdd(){
  const name = document.getElementById("new-item-name").value;
  const category = document.getElementById("new-item-category").value;
  if(!name.trim()) return;
  addItem(name, category);
  closeAdd();
}

function closeAdd(){
  state.showAdd = false;
  render();
}

function openAdd(){
  state.showAdd = true;
  render();
  setTimeout(() => {
    const el = document.getElementById("new-item-name");
    if(el) el.focus();
  }, 50);
}

function renderEditItemModal(){
  if(!state.editingItemId) return "";
  const item = state.items.find(i => i.id === state.editingItemId);
  if(!item) return "";
  return `
    <div class="modal-overlay" onclick="if(event.target===this) closeEditItem()">
      <div class="modal-sheet">
        <div class="close-row"><button onclick="closeEditItem()">閉じる</button></div>
        <h3>項目を編集</h3>
        <div class="add-form">
          <input type="text" id="edit-item-name" value="${escapeHtml(item.name)}" />
          <select id="edit-item-category">
            ${[...CATEGORIES_FOOD, CATEGORY_DAILY].map(c => `<option value="${escapeHtml(c)}" ${c === item.category ? "selected" : ""}>${escapeHtml(c)}</option>`).join("")}
          </select>
          <button class="add-btn" onclick="saveEditItem()">保存</button>
        </div>
      </div>
    </div>
  `;
}

function setTab(tab){
  state.tab = tab;
  render();
}

function setCategoryFilter(cat){
  state.categoryFilter = cat;
  render();
}

function render(){
  const needCount = state.items.filter(i => i.status === "yellow" || i.status === "red").length;
  const app = document.getElementById("app");
  app.innerHTML = `
    <header>
      <h1>うちのストック</h1>
      <p>在庫と買い物リストをまとめて管理</p>
    </header>
    <div class="legend">
      <span><i style="background:var(--blue)"></i>十分</span>
      <span><i style="background:var(--yellow)"></i>検討</span>
      <span><i style="background:var(--red)"></i>必須</span>
    </div>
    <div class="tabs">
      <button class="tab ${state.tab==='inventory'?'active':''}" onclick="setTab('inventory')">在庫</button>
      <button class="tab ${state.tab==='shopping'?'active':''}" onclick="setTab('shopping')">
        買い物リスト
        ${needCount > 0 ? `<span class="badge">${needCount}</span>` : ""}
      </button>
    </div>
    <main>
      ${state.tab === 'inventory' ? renderInventoryTab() : renderShoppingTab()}
    </main>
    ${state.tab === 'inventory' ? `<button class="fab" aria-label="追加" onclick="openAdd()">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M12 5v14"/><path d="M5 12h14"/></svg>
    </button>` : ""}
    ${renderAddModal()}
    ${renderEditItemModal()}
  `;

  // 在庫タブのジェスチャーを有効化
  if(state.tab === "inventory"){
    if(state.editMode) setupDrag();
    else setupLongPress();
  }
}

window.addEventListener("DOMContentLoaded", loadState);
if(document.readyState !== "loading") loadState();
</script>
</body>
</html>
