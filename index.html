<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>うちのストック</title>
<style>
  :root{
    --bg: #FAF6F1;
    --card: #FFFFFF;
    --card-soft: #F3ECE2;
    --ink: #3A3530;
    --ink-soft: #8A8175;
    --line: #E6DCCB;
    --accent: #2E3338;
    --blue: #7B9E89;
    --blue-bg: #E7EFE9;
    --blue-text: #3F5C4C;
    --yellow: #D9A857;
    --yellow-bg: #FBF1E0;
    --yellow-text: #8A6322;
    --red: #C4665A;
    --red-bg: #FBEAE7;
    --red-text: #8A3C32;
  }
  *{ box-sizing: border-box; }
  body{
    margin:0;
    font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Noto Sans JP", sans-serif;
    background: var(--bg);
    color: var(--ink);
    -webkit-font-smoothing: antialiased;
  }
  #app{
    max-width: 480px;
    margin: 0 auto;
    min-height: 100vh;
    padding-bottom: 90px;
  }
  header{
    padding: 28px 20px 16px;
  }
  header h1{
    font-size: 21px;
    font-weight: 600;
    margin: 0 0 2px;
    letter-spacing: 0.02em;
  }
  header p{
    font-size: 13px;
    color: var(--ink-soft);
    margin: 0;
  }
  .tabs{
    display: flex;
    gap: 6px;
    padding: 0 20px;
    margin-bottom: 18px;
  }
  .tab{
    flex: 1;
    text-align: center;
    padding: 10px 0;
    border-radius: 999px;
    font-size: 14px;
    font-weight: 600;
    background: var(--card-soft);
    color: var(--ink-soft);
    border: none;
    cursor: pointer;
    position: relative;
    transition: background 0.15s, color 0.15s;
  }
  .tab.active{
    background: var(--accent);
    color: #fff;
  }
  .tab .badge{
    position: absolute;
    top: -6px;
    right: 10px;
    background: var(--red);
    color: #fff;
    font-size: 10px;
    font-weight: 700;
    border-radius: 999px;
    min-width: 16px;
    height: 16px;
    line-height: 16px;
    padding: 0 4px;
  }
  main{ padding: 0 20px; }
  .section-label{
    font-size: 12px;
    font-weight: 600;
    color: var(--ink-soft);
    letter-spacing: 0.06em;
    margin: 22px 0 10px;
    padding-left: 2px;
  }
  .section-label:first-child{ margin-top: 4px; }
  .cat-filter-row{
    display: flex;
    gap: 6px;
    overflow-x: auto;
    padding: 2px 2px 14px;
    margin: 0 -2px;
  }
  .cat-filter-chip{
    flex-shrink: 0;
    padding: 7px 14px;
    border-radius: 999px;
    background: var(--card-soft);
    border: 1px solid var(--line);
    font-size: 13px;
    font-weight: 600;
    color: var(--ink-soft);
    cursor: pointer;
  }
  .cat-filter-chip.active{
    background: var(--accent);
    border-color: var(--accent);
    color: #fff;
  }
  .cat-group{ margin-bottom: 4px; }
  .item-card{
    background: var(--card);
    border: 1px solid var(--line);
    border-radius: 16px;
    padding: 12px 14px;
    margin-bottom: 8px;
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .item-main{ flex: 1; min-width: 0; }
  .item-name{
    font-size: 15px;
    font-weight: 600;
    margin: 0 0 2px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .item-meta{
    font-size: 11.5px;
    color: var(--ink-soft);
    display: flex;
    gap: 8px;
    align-items: center;
  }
  .status-dots{
    display: flex;
    gap: 5px;
    flex-shrink: 0;
  }
  .dot-btn{
    width: 30px;
    height: 30px;
    border-radius: 50%;
    border: 2px solid transparent;
    cursor: pointer;
    padding: 0;
    position: relative;
  }
  .dot-btn.blue{ background: var(--blue); }
  .dot-btn.yellow{ background: var(--yellow); }
  .dot-btn.red{ background: var(--red); }
  .dot-btn.selected{ border-color: var(--accent); }
  .dot-btn.selected::after{
    content: "";
    position: absolute;
    inset: -5px;
    border: 1.5px solid var(--accent);
    border-radius: 50%;
  }
  .del-btn{
    width: 30px;
    height: 30px;
    border-radius: 50%;
    border: none;
    background: transparent;
    color: var(--ink-soft);
    font-size: 16px;
    cursor: pointer;
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .del-btn:active{ background: var(--card-soft); }
  .add-form{
    background: var(--card);
    border: 1px solid var(--line);
    border-radius: 16px;
    padding: 14px;
    margin-bottom: 18px;
  }
  .add-form input, .add-form select{
    width: 100%;
    padding: 10px 12px;
    border-radius: 10px;
    border: 1px solid var(--line);
    background: var(--bg);
    font-size: 14px;
    color: var(--ink);
    margin-bottom: 8px;
  }
  .add-form .row{ display:flex; gap: 8px; }
  .add-form .row > *{ flex:1; }
  .add-btn{
    width: 100%;
    padding: 11px 0;
    border-radius: 10px;
    border: none;
    background: var(--accent);
    color: #fff;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
  }
  .template-row{
    display: flex;
    gap: 8px;
    overflow-x: auto;
    padding: 2px 2px 14px;
    margin: 0 -2px;
  }
  .template-chip{
    flex-shrink: 0;
    padding: 8px 14px;
    border-radius: 999px;
    background: var(--card-soft);
    border: 1px solid var(--line);
    font-size: 13px;
    color: var(--ink);
    cursor: pointer;
    white-space: nowrap;
  }
  .empty{
    text-align: center;
    padding: 50px 20px;
    color: var(--ink-soft);
    font-size: 13.5px;
    line-height: 1.7;
  }
  .fab{
    position: fixed;
    bottom: 24px;
    right: 50%;
    transform: translateX(170px);
    width: 52px;
    height: 52px;
    border-radius: 50%;
    background: var(--accent);
    color: #fff;
    font-size: 26px;
    border: none;
    box-shadow: 0 4px 14px rgba(0,0,0,0.18);
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  @media (max-width: 480px){
    .fab{ right: 24px; transform: none; }
  }
  .shop-item{
    background: var(--card);
    border: 1px solid var(--line);
    border-radius: 16px;
    padding: 13px 14px;
    margin-bottom: 8px;
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .shop-check{
    width: 26px;
    height: 26px;
    border-radius: 50%;
    border: 2px solid var(--line);
    flex-shrink: 0;
    cursor: pointer;
    background: transparent;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 14px;
  }
  .shop-main{ flex: 1; }
  .shop-name{ font-size: 15px; font-weight: 600; margin: 0 0 2px; }
  .shop-tag{
    display: inline-block;
    font-size: 11px;
    font-weight: 700;
    padding: 2px 8px;
    border-radius: 999px;
  }
  .shop-tag.red{ background: var(--red-bg); color: var(--red-text); }
  .shop-tag.yellow{ background: var(--yellow-bg); color: var(--yellow-text); }
  .modal-overlay{
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.4);
    display: flex; align-items: flex-end; justify-content: center;
    z-index: 50;
  }
  .modal-sheet{
    background: var(--bg);
    width: 100%;
    max-width: 480px;
    border-radius: 20px 20px 0 0;
    padding: 20px 20px 28px;
  }
  .modal-sheet h3{ margin: 0 0 14px; font-size: 17px; font-weight: 600; }
  .close-row{ text-align: right; margin-bottom: 4px; }
  .close-row button{
    border:none; background:none; color: var(--ink-soft); font-size: 13px; cursor:pointer;
  }
  .legend{
    display: flex;
    gap: 14px;
    font-size: 11.5px;
    color: var(--ink-soft);
    padding: 0 22px 6px;
  }
  .legend span{ display:flex; align-items:center; gap:4px; }
  .legend i{ width:8px; height:8px; border-radius:50%; display:inline-block; }
  .loading{ text-align:center; padding: 60px 0; color: var(--ink-soft); font-size: 13px; }
</style>
</head>
<body>
<div id="app"><div class="loading">読み込み中…</div></div>

<script>
const CATEGORIES_FOOD = ["冷蔵庫","冷凍庫","乾物","調味料"];
const CATEGORY_DAILY = "日用品";
const DEFAULT_TEMPLATES = [
  {name:"卵", category:"冷蔵庫"},
  {name:"牛乳", category:"冷蔵庫"},
  {name:"納豆", category:"冷蔵庫"},
  {name:"鶏むね肉", category:"冷凍庫"},
  {name:"米", category:"乾物"},
  {name:"パスタ", category:"乾物"},
  {name:"醤油", category:"調味料"},
  {name:"味噌", category:"調味料"},
  {name:"トイレットペーパー", category:"日用品"},
  {name:"洗濯洗剤", category:"日用品"},
  {name:"歯磨き粉", category:"日用品"},
];

let state = {
  items: [],
  templates: DEFAULT_TEMPLATES,
  tab: "inventory",
  showAdd: false,
  categoryFilter: "all",
};

const STORAGE_KEY = "stock-items-v1";

function uid(){ return Date.now().toString(36) + Math.random().toString(36).slice(2,7); }

function daysBetween(a,b){
  return Math.round((b-a)/(1000*60*60*24));
}

async function loadState(){
  try{
    const raw = localStorage.getItem(STORAGE_KEY);
    if(raw){
      const parsed = JSON.parse(raw);
      state.items = parsed.items || [];
    }
  }catch(e){
    state.items = [];
  }
  // ブラウザにデータを長期保存（消えにくく）するようリクエスト
  try{
    if(navigator.storage && navigator.storage.persist){
      await navigator.storage.persist();
    }
  }catch(e){ /* 未対応ブラウザは無視 */ }
  render();
}

function saveState(){
  try{
    localStorage.setItem(STORAGE_KEY, JSON.stringify({items: state.items}));
  }catch(e){
    console.error("保存に失敗しました", e);
  }
}

function addItem(name, category){
  if(!name || !name.trim()) return;
  const exists = state.items.find(i => i.name === name.trim() && i.category === category);
  if(exists){
    exists.status = "blue";
    exists.lastBought = Date.now();
    exists.history.push(Date.now());
  } else {
    state.items.push({
      id: uid(),
      name: name.trim(),
      category: category,
      status: "blue",
      lastBought: Date.now(),
      history: [Date.now()],
    });
  }
  saveState();
  render();
}

function setStatus(id, status){
  const item = state.items.find(i => i.id === id);
  if(!item) return;
  item.status = status;
  if(status === "blue"){
    item.lastBought = Date.now();
    item.history.push(Date.now());
    if(item.history.length > 10) item.history.shift();
  }
  saveState();
  render();
}

function deleteItem(id){
  state.items = state.items.filter(i => i.id !== id);
  saveState();
  render();
}

function getCycleText(item){
  if(item.history.length < 2) return null;
  const intervals = [];
  for(let i=1;i<item.history.length;i++){
    intervals.push(daysBetween(item.history[i-1], item.history[i]));
  }
  const avg = Math.round(intervals.reduce((a,b)=>a+b,0)/intervals.length);
  return avg;
}

function escapeHtml(s){
  return s.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");
}

function renderDots(item){
  const colors = ["blue","yellow","red"];
  return `<div class="status-dots">
    ${colors.map(c => `<button class="dot-btn ${c} ${item.status===c?'selected':''}" aria-label="${c}" onclick="setStatus('${item.id}','${c}')"></button>`).join("")}
  </div>`;
}

function renderInventoryTab(){
  const allCats = [...CATEGORIES_FOOD, CATEGORY_DAILY];
  let html = "";

  const templatesHtml = `
    <div class="template-row">
      ${state.templates.map(t => `<button class="template-chip" onclick="addItem('${escapeHtml(t.name)}','${escapeHtml(t.category)}')">+ ${escapeHtml(t.name)}</button>`).join("")}
    </div>
  `;
  html += templatesHtml;

  const filterChips = ["all", ...allCats];
  html += `
    <div class="cat-filter-row">
      ${filterChips.map(c => `<button class="cat-filter-chip ${state.categoryFilter===c?'active':''}" onclick="setCategoryFilter('${escapeHtml(c)}')">${c === 'all' ? '一覧表示' : escapeHtml(c)}</button>`).join("")}
    </div>
  `;

  const catsToShow = state.categoryFilter === "all" ? allCats : [state.categoryFilter];

  if(state.items.length === 0){
    html += `<div class="empty">在庫がまだありません。<br>上のテンプレートをタップするか、右下の + ボタンから追加してください。</div>`;
  } else {
    let anyShown = false;
    catsToShow.forEach(cat => {
      const itemsInCat = state.items.filter(i => i.category === cat);
      if(itemsInCat.length === 0) return;
      anyShown = true;
      html += `<div class="section-label">${escapeHtml(cat)}</div>`;
      itemsInCat.forEach(item => {
        const cycle = getCycleText(item);
        html += `
          <div class="item-card">
            <div class="item-main">
              <p class="item-name">${escapeHtml(item.name)}</p>
              <div class="item-meta">
                <span>${cycle ? `平均${cycle}日サイクル` : "購入記録なし"}</span>
              </div>
            </div>
            ${renderDots(item)}
            <button class="del-btn" aria-label="削除" onclick="deleteItem('${item.id}')">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 6h18"/><path d="M8 6V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/><path d="M10 11v6"/><path d="M14 11v6"/></svg>
            </button>
          </div>
        `;
      });
    });
    if(!anyShown){
      html += `<div class="empty">このカテゴリにはまだ在庫がありません。</div>`;
    }
  }
  return html;
}

function renderShoppingTab(){
  const needed = state.items.filter(i => i.status === "yellow" || i.status === "red");
  needed.sort((a,b) => {
    if(a.status === b.status) return 0;
    return a.status === "red" ? -1 : 1;
  });

  if(needed.length === 0){
    return `<div class="empty">買い物リストは空です。<br>在庫が黄色・赤になると自動でここに表示されます。</div>`;
  }

  let html = `<div class="section-label">買うもの（${needed.length}）</div>`;
  needed.forEach(item => {
    html += `
      <div class="shop-item">
        <button class="shop-check" aria-label="買った" onclick="setStatus('${item.id}','blue')"></button>
        <div class="shop-main">
          <p class="shop-name">${escapeHtml(item.name)}</p>
          <span class="shop-tag ${item.status}">${item.status === 'red' ? '必須' : '検討'}</span>
        </div>
      </div>
    `;
  });
  return html;
}

function renderAddModal(){
  if(!state.showAdd) return "";
  return `
    <div class="modal-overlay" onclick="if(event.target===this) closeAdd()">
      <div class="modal-sheet">
        <div class="close-row"><button onclick="closeAdd()">閉じる</button></div>
        <h3>新しい品目を追加</h3>
        <div class="add-form">
          <input type="text" id="new-item-name" placeholder="品名（例：ヨーグルト）" />
          <select id="new-item-category">
            ${[...CATEGORIES_FOOD, CATEGORY_DAILY].map(c => `<option value="${escapeHtml(c)}">${escapeHtml(c)}</option>`).join("")}
          </select>
          <button class="add-btn" onclick="submitAdd()">追加する</button>
        </div>
      </div>
    </div>
  `;
}

function submitAdd(){
  const name = document.getElementById("new-item-name").value;
  const category = document.getElementById("new-item-category").value;
  if(!name.trim()) return;
  addItem(name, category);
  closeAdd();
}

function closeAdd(){
  state.showAdd = false;
  render();
}

function openAdd(){
  state.showAdd = true;
  render();
  setTimeout(() => {
    const el = document.getElementById("new-item-name");
    if(el) el.focus();
  }, 50);
}

function setTab(tab){
  state.tab = tab;
  render();
}

function setCategoryFilter(cat){
  state.categoryFilter = cat;
  render();
}

function render(){
  const needCount = state.items.filter(i => i.status === "yellow" || i.status === "red").length;
  const app = document.getElementById("app");
  app.innerHTML = `
    <header>
      <h1>うちのストック</h1>
      <p>在庫と買い物リストをまとめて管理</p>
    </header>
    <div class="legend">
      <span><i style="background:var(--blue)"></i>十分</span>
      <span><i style="background:var(--yellow)"></i>検討</span>
      <span><i style="background:var(--red)"></i>必須</span>
    </div>
    <div class="tabs">
      <button class="tab ${state.tab==='inventory'?'active':''}" onclick="setTab('inventory')">在庫</button>
      <button class="tab ${state.tab==='shopping'?'active':''}" onclick="setTab('shopping')">
        買い物リスト
        ${needCount > 0 ? `<span class="badge">${needCount}</span>` : ""}
      </button>
    </div>
    <main>
      ${state.tab === 'inventory' ? renderInventoryTab() : renderShoppingTab()}
    </main>
    ${state.tab === 'inventory' ? `<button class="fab" aria-label="追加" onclick="openAdd()">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M12 5v14"/><path d="M5 12h14"/></svg>
    </button>` : ""}
    ${renderAddModal()}
  `;
}

window.addEventListener("DOMContentLoaded", loadState);
if(document.readyState !== "loading") loadState();
</script>
</body>
</html>
